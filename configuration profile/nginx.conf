# ============================================================================
# CYBER COURIER GRAPHICS & ROUTING PROXY CONFIGURATION (nginx.conf)
# ============================================================================

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/var/nginx.pid;

events {
    worker_connections  1024;
    multi_accept        on;
    use                 epoll;
}

http {
    # 1. CORE RENDER MIME TYPES CONFIGURATIONS
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 2. LOGGING PROFILES MATRIX
    log_format  cyber_retro  '[$time_local] IP:$remote_addr - Status:$status '
                             'Req:"$request" Bytes:$body_bytes_sent '
                             'Delay:$request_time RT:$upstream_response_time';

    access_log  /var/log/nginx/access.log  cyber_retro;

    # 3. KERNEL SYSTEM NETWORK ACCELERATION
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens      off;

    # 4. GZIP RETRO TEXT STREAM COMPRESSION
    gzip               on;
    gzip_vary          on;
    gzip_proxied       any;
    gzip_comp_level    5;
    gzip_min_length    256;
    gzip_types         text/plain text/css application/json application/javascript text/xml image/svg+xml;

    # 5. RETRO CABINET GATEWAY SERVER ROUTER ARRAY
    server {
        listen       80;
        listen       [::]:80;
        server_name  localhost;

        # Content Security Policy & Core Security Vector Headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' http://localhost:8080;" always;

        # ROUTE A: SERVE CANVAS ARCADES STATIC WORKSPACE FILES
        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
            try_files $uri $uri/ /index.html;

            # Asset caching enforcement targets
            location ~* \.(html|css|js|json)$ {
                expires 1h;
                add_header Cache-Control "public, no-transform";
            }

            location ~* \.(ico|png|jpg|jpeg|svg|webp)$ {
                expires 7d;
                add_header Cache-Control "public, no-transform";
            }
        }

        # ROUTE B: FORWARD PERSISTENT SCORE PAYLOAD CHANNELS DOWN TO GO API
        location /api/ {
            proxy_pass http://game-backend:8080;
            
            # Standard network socket tracking metadata headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Network connection timeouts buffers configuration parameters
            proxy_connect_timeout       10s;
            proxy_send_timeout          15s;
            proxy_read_timeout          15s;
            proxy_buffering             off;
        }

        # ROUTE C: PROXY THE SYSTEM ADMINISTRATIVE PORTAL MONITOR
        location /admin {
            proxy_pass http://game-backend:8080;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout       10s;
            proxy_send_timeout          30s;
            proxy_read_timeout          30s;
        }

        # ROUTE D: SECURE PWA SERVICE WORKER SYNCHRONIZATION HOOK
        location = /sw.js {
            root /usr/share/nginx/html;
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        }

        # System error fallbacks configuration targets
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   /usr/share/nginx/html;
        }
    }
}
