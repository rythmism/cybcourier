<svg width="32" height="64" viewBox="0 0 32 64" xmlns="http://www.w3.org/2000/svg" aria-labelledby="title desc" role="img">
  <title id="title">Cyberpunk Running Courier</title>
  <desc id="desc">Side profile of a cyberpunk courier mid-stride, neon retro aesthetic</desc>
  
  <!-- Backpack (behind torso) -->
  <rect 
    x="7.5" y="27" width="6" height="14.5" rx="1" 
    fill="#140526" stroke="#00f0ff" stroke-width="1.5"/>
  <!-- Backpack straps/highlights -->
  <rect 
    x="12" y="28.5" width="2" height="11" 
    fill="#1a0a33" stroke="#00f0ff" stroke-width="1"/>
  <rect 
    x="8" y="30" width="6" height="2" 
    fill="#00f0ff" opacity="0.25"/>

  <!-- Trailing (back) leg - thigh -->
  <path 
    d="M18,40 L13.5,50.5" 
    fill="transparent" stroke="#140526" stroke-width="6" stroke-linecap="round"/>
  <path 
    d="M18,40 L13.5,50.5" 
    fill="transparent" stroke="#00f0ff" stroke-width="2" stroke-linecap="round"/>

  <!-- Trailing leg - calf -->
  <path 
    d="M13.5,50.5 L9.8,56.5" 
    fill="transparent" stroke="#140526" stroke-width="5.5" stroke-linecap="round"/>
  <path 
    d="M13.5,50.5 L9.8,56.5" 
    fill="transparent" stroke="#00f0ff" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Trailing leg boot -->
  <path 
    d="M9.8,56.5 L5.5,56.2 L5.2,57.8 L10.2,58" 
    fill="#140526" stroke="#00f0ff" stroke-width="1"/>

  <!-- Torso base -->
  <polygon 
    points="13.5,24.5 13,39 11.5,40.5 23.5,41 24.5,33 23,25 19.5,23.5" 
    fill="#140526" stroke="#00f0ff" stroke-width="1.5"/>

  <!-- Torso armor panel (cyan) -->
  <polygon 
    points="14.5,26 14.2,37.5 22.5,38.5 23.5,30 20.5,26" 
    fill="#00f0ff" opacity="0.85" stroke="none"/>
  
  <!-- Torso neon accents -->
  <path 
    d="M15.5,28 L22.5,29.5" 
    fill="transparent" stroke="#ff007f" stroke-width="1"/>
  <path 
    d="M15,33 L22.8,34.5" 
    fill="transparent" stroke="#00f0ff" stroke-width="1"/>

  <!-- Forward leg - thigh -->
  <path 
    d="M18.5,40 L25.2,47" 
    fill="transparent" stroke="#140526" stroke-width="6.2" stroke-linecap="round"/>
  <path 
    d="M18.5,40 L25.2,47" 
    fill="transparent" stroke="#00f0ff" stroke-width="2" stroke-linecap="round"/>

  <!-- Forward leg - calf -->
  <path 
    d="M25.2,47 L29,55.5" 
    fill="transparent" stroke="#140526" stroke-width="5.5" stroke-linecap="round"/>
  <path 
    d="M25.2,47 L29,55.5" 
    fill="transparent" stroke="#00f0ff" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Forward leg boot -->
  <path 
    d="M29,55.5 L29.5,57 L33,56.8 L32.8,55.2 L29.8,54.8 Z" 
    fill="#140526" stroke="#00f0ff" stroke-width="1"/>

  <!-- Forward arm (swinging forward) - upper arm -->
  <path 
    d="M22.5,29 L28.5,34" 
    fill="transparent" stroke="#140526" stroke-width="4.5" stroke-linecap="round"/>
  <path 
    d="M22.5,29 L28.5,34" 
    fill="transparent" stroke="#00f0ff" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Forward arm - forearm -->
  <path 
    d="M28.5,34 L31.5,29.5" 
    fill="transparent" stroke="#140526" stroke-width="4" stroke-linecap="round"/>
  <path 
    d="M28.5,34 L31.5,29.5" 
    fill="transparent" stroke="#00f0ff" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Forward hand / package (courier item) -->
  <rect 
    x="30.5" y="28" width="4.2" height="4" rx="0.5" 
    fill="#ff007f" stroke="#00f0ff" stroke-width="1"/>
  <!-- Package neon highlight -->
  <rect 
    x="31" y="28.5" width="1" height="3" 
    fill="#00f0ff" opacity="0.6"/>

  <!-- Back arm (swinging rear) - upper arm -->
  <path 
    d="M15.5,29.5 L11.8,36.5" 
    fill="transparent" stroke="#140526" stroke-width="4.2" stroke-linecap="round"/>
  <path 
    d="M15.5,29.5 L11.8,36.5" 
    fill="transparent" stroke="#00f0ff" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Back arm - forearm -->
  <path 
    d="M11.8,36.5 L8.5,34.8" 
    fill="transparent" stroke="#140526" stroke-width="3.8" stroke-linecap="round"/>
  <path 
    d="M11.8,36.5 L8.5,34.8" 
    fill="transparent" stroke="#00f0ff" stroke-width="1.3" stroke-linecap="round"/>

  <!-- Helmet base -->
  <path 
    d="M12.5,12 L12.8,20.5 L10.5,22.5 L25.5,23.5 L26.5,18 L24.2,11.5 L19.5,9 L15.5,9.5 Z" 
    fill="#140526" stroke="#00f0ff" stroke-width="2"/>

  <!-- Helmet top ridge -->
  <path 
    d="M15,10 L19.5,9 L23,11" 
    fill="transparent" stroke="#00f0ff" stroke-width="2"/>

  <!-- Helmet visor (magenta glow) -->
  <path 
    d="M14.5,16.5 L24.8,16 L24.2,19.8 L15.5,20.2 Z" 
    fill="#ff007f" stroke="#00f0ff" stroke-width="1.2"/>

  <!-- Visor inner glow line -->
  <path 
    d="M15.8,17.8 L23.8,17.5" 
    fill="transparent" stroke="#ffffff" stroke-width="0.8" opacity="0.75"/>

  <!-- Neck connector -->
  <rect 
    x="14.5" y="23" width="6" height="3" 
    fill="#140526" stroke="#00f0ff" stroke-width="1"/>

</svg>
