events { worker_connections 1024; }
http {
    include /etc/nginx/mime.types;
    server {
        listen 80;
        location / {
            root /usr/share/nginx/html;
            index index.html;
        }
        location /api/ {
            proxy_pass http://game-backend:8080;
            proxy_set_header Host $host;
        }
        location /admin {
            proxy_pass http://game-backend:8080;
            proxy_set_header Host $host;
        }
    }
}
